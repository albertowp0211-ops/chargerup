    <text x="120" y="502" font-size="30" fill="#334155" dominant-baseline="central" font-family="Segoe UI, Arial, sans-serif">Carga un portátil o dos móviles a la vez</text>
    <circle cx="90" cy="594" r="7" fill="#2563eb"/>
    <text x="120" y="594" font-size="30" fill="#334155" dominant-baseline="central" font-family="Segoe UI, Arial, sans-serif">Más compacto y sin sobrecalentamiento</text>
</svg>