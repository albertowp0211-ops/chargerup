<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="Características de Cargador 65W USB-C">
  <rect width="800" height="800" fill="#ffffff"/>
  <rect x="0" y="0" width="800" height="200" fill="#f1f5f9"/>
  <text x="60" y="115" font-size="88" dominant-baseline="central">🔌</text>
  <text x="180" y="100" font-size="34" font-weight="800" fill="#0f172a" dominant-baseline="central" font-family="Segoe UI, Arial, sans-serif">Características</text>
  <text x="180" y="140" font-size="24" fill="#64748b" dominant-baseline="central" font-family="Segoe UI, Arial, sans-serif">Cargador 65W USB-C</text>
  
    <circle cx="90" cy="318" r="7" fill="#2563eb"/>
    <text x="120" y="318" font-size="30" fill="#334155" dominant-baseline="central" font-family="Segoe UI, Arial, sans-serif">65W de potencia máxima con Power Delivery…</text>
    <circle cx="90" cy="410" r="7" fill="#2563eb"/>
    <text x="120" y="410" font-size="30" fill="#334155" dominant-baseline="central" font-family="Segoe UI, Arial, sans-serif">2 puertos USB-C + 1 puerto USB-A</text>
